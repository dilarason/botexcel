<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BotExcel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f9f9f9;
        }
        h1 {
            font-size: 2.5em;
            color: #1a1a1a;
        }
        p {
            font-size: 1.3em;
            color: #444;
            margin-bottom: 40px;
        }
        form {
            margin-top: 30px;
        }
        input[type="file"] {
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Veri Karmaşasından Tablo Netliğine.</h1>
    <p>Dönüştür. Düzenle. Değer Kat. — BotExcel ile akıllı dönüşüm, hızlı ve anlamlı sonuçlar.</p>

    <form method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Excel'e Dönüştür</button>
    </form>
</body>
</html>
